# Defaults en la interpolación: sin ellos, cualquier `docker compose ...`
# ejecutado sin .env presente falla con un error críptico.
name: ${PROJECT_NAME:-edicionesmox-magento2}

x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  networks:
    - magento

# Una sola imagen PHP para php-fpm, cron y cli. Solo php-fpm declara `build:`;
# los otros dos consumen el tag ya construido — antes compose construía la
# misma imagen hasta tres veces con tags distintos.
x-php-image: &php-image ${PROJECT_NAME:-edicionesmox-magento2}-php:dev

# El certificado corporativo NO se pasa por variable: el Dockerfile copia
# cualquier .crt presente en docker/php/certs/ (ver .env.example).
x-php-build: &php-build
  context: ./docker/php
  args:
    PHP_VERSION: ${PHP_VERSION:-8.3}

x-magento-php-volumes: &magento-php-volumes
  - ./src:/var/www/html:cached
  - magento_var:/var/www/html/var
  - magento_generated:/var/www/html/generated
  - magento_pub_static:/var/www/html/pub/static
  - magento_vendor:/var/www/html/vendor
  - magento_lib:/var/www/html/lib
  - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-magento.ini:ro
  - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
  - composer_cache:/var/www/.composer/cache

x-magento-nginx-volumes: &magento-nginx-volumes
  - ./src:/var/www/html:cached
  - magento_var:/var/www/html/var
  - magento_generated:/var/www/html/generated
  - magento_pub_static:/var/www/html/pub/static
  - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  - nginx_certs:/etc/nginx/certs

x-php-environment: &php-environment
  PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-2G}
  COMPOSER_CACHE_DIR: /var/www/.composer/cache

x-magento-depends-on: &magento-depends-on
  db:
    condition: service_healthy
  opensearch:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  nginx:
    <<: *service-defaults
    image: ${PROJECT_NAME:-edicionesmox-magento2}-nginx:dev
    build:
      context: ./docker/nginx
      args:
        NGINX_VERSION: ${NGINX_VERSION:-1.28-alpine}
    container_name: ${PROJECT_NAME}_nginx
    depends_on:
      php-fpm:
        condition: service_healthy
    ports:
      # Default 127.0.0.1: mismo criterio que db/redis/opensearch. Para exponer
      # a la LAN, setea NGINX_BIND_ADDRESS=0.0.0.0 en .env.
      # Puerto 80: solo redirige a https (ver docker/nginx/default.conf).
      - "${NGINX_BIND_ADDRESS:-127.0.0.1}:${NGINX_PORT:-8080}:80"
      - "${NGINX_BIND_ADDRESS:-127.0.0.1}:${NGINX_HTTPS_PORT:-8443}:443"
    volumes: *magento-nginx-volumes
    healthcheck:
      # Verifica que nginx escuche de verdad (nginx -t solo validaba sintaxis
      # de la config y daba healthy aunque el proceso no sirviera nada).
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80"]
      interval: 30s
      timeout: 10s
      retries: 3

  php-fpm:
    <<: *service-defaults
    image: *php-image
    build: *php-build
    container_name: ${PROJECT_NAME}_php
    depends_on: *magento-depends-on
    expose:
      - "9000"
    volumes: *magento-php-volumes
    environment: *php-environment
    healthcheck:
      # Conexión TCP real al pool (php-fpm -t solo validaba sintaxis de la
      # config, pasaba aunque el master estuviera muerto).
      test: ["CMD", "php", "-r", "exit((int)!fsockopen('127.0.0.1', 9000));"]
      interval: 30s
      timeout: 10s
      retries: 3

  cron:
    <<: *service-defaults
    image: *php-image
    container_name: ${PROJECT_NAME}_cron
    # Mismo usuario que php-fpm: si el cron corre como root, var/ y generated/
    # quedan con archivos de root y php-fpm (www-data) deja de poder escribirlos.
    user: www-data
    depends_on: *magento-depends-on
    volumes: *magento-php-volumes
    environment: *php-environment
    working_dir: /var/www/html
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        trap "exit 0" TERM INT;
        while true; do
          php /var/www/html/bin/magento cron:run 2>&1 || true;
          sleep 60 & wait $$!;
        done

  cli:
    <<: *service-defaults
    image: *php-image
    container_name: ${PROJECT_NAME}_cli
    profiles:
      - tools
    depends_on: *magento-depends-on
    volumes: *magento-php-volumes
    environment: *php-environment
    working_dir: /var/www/html
    entrypoint: ["/bin/bash", "-lc"]
    command: "bash"
    tty: true
    stdin_open: true

  db:
    <<: *service-defaults
    image: mariadb:${MARIADB_VERSION:-11.4}
    container_name: ${PROJECT_NAME}_db
    command:
      - --max_allowed_packet=64M
      - --innodb_buffer_pool_size=${MARIADB_BUFFER_POOL_SIZE:-1G}
      - --innodb_flush_log_at_trx_commit=2
      - --slow_query_log=1
      - --slow_query_log_file=/var/lib/mysql/slow.log
      - --long_query_time=1
      - --log_slow_verbosity=query_plan,explain
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_BIND_ADDRESS:-127.0.0.1}:${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # healthcheck.sh viene en la imagen oficial de MariaDB y usa un usuario
      # interno propio: la contraseña de root deja de quedar visible en
      # `docker inspect` / lista de procesos.
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 10s
      retries: 10

  opensearch:
    <<: *service-defaults
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-2.19.0}
    container_name: ${PROJECT_NAME}_opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${OPENSEARCH_BIND_ADDRESS:-127.0.0.1}:${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 15

  redis:
    <<: *service-defaults
    image: redis:${REDIS_VERSION:-7.2-alpine}
    container_name: ${PROJECT_NAME}_redis
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --loglevel
      - warning
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "${REDIS_BIND_ADDRESS:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    <<: *service-defaults
    image: axllent/mailpit:${MAILPIT_VERSION:-latest}
    container_name: ${PROJECT_NAME}_mailpit
    ports:
      - "${MAILPIT_BIND_ADDRESS:-127.0.0.1}:${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_BIND_ADDRESS:-127.0.0.1}:${MAILPIT_SMTP_PORT:-1025}:1025"

networks:
  magento:
    driver: bridge

volumes:
  db_data:
  opensearch_data:
  redis_data:
  composer_cache:
  magento_var:
  magento_generated:
  magento_pub_static:
  magento_vendor:
  magento_lib:
  nginx_certs:

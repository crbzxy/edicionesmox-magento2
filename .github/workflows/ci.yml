name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: PHP lint + Magento Coding Standard (custom code only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Install phpcs + Magento Coding Standard
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP syntax check (php -l)
        run: |
          find src/app/code/EdicionesMox src/app/design/frontend/EdicionesMox \( -name '*.php' -o -name '*.phtml' \) -print0 \
            | xargs -0 -n1 php -l

      - name: Well-formed XML check
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils
          find src/app/code/EdicionesMox src/app/design/frontend/EdicionesMox -name '*.xml' -print0 \
            | xargs -0 xmllint --noout

      # warning-severity=0: el ruleset Magento2 genera ~70 warnings de estilo CSS/LESS
      # preexistentes (comillas, mayúsculas de color) en el tema Ediciones Mox. El gate falla
      # solo por errores reales; subir la severidad de warnings queda como tarea de
      # limpieza incremental, no como bloqueo del primer CI.
      - name: Magento Coding Standard (phpcs)
        run: vendor/bin/phpcs --standard=phpcs.xml.dist --warning-severity=0

  compose:
    name: docker compose config (interpolación y defaults)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Valida el contrato: .env.example debe producir una config interpolable.
      - name: Validar compose con .env.example
        run: |
          cp .env.example .env
          docker compose config --quiet

      # Valida los defaults: compose no debe reventar sin .env presente.
      - name: Validar compose sin .env
        run: |
          rm .env
          docker compose config --quiet

      - name: Sintaxis de scripts bash
        run: bash -n docker/php/docker-entrypoint.sh docker/scripts/doctor.sh

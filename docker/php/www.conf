[www]
user = www-data
group = www-data

listen = 9000

; max_children acota la RAM del pool: con memory_limit=2G, 20 workers dan un
; techo teórico de 40G — más de lo que Docker Desktop suele tener asignado.
; Para desarrollo local 8 workers sobran y el techo queda en 16G teóricos
; (~3-4G reales: un worker de Magento ronda 300-500M).
pm = dynamic
pm.max_children = 8
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500

clear_env = no

catch_workers_output = yes
decorate_workers_output = no
